name: 🔧 Build Morphe YouTube

on:
  schedule:
    # Setiap hari jam 06:00 UTC (13:00 WIB)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      yt_version:
        description: "Versi YouTube (kosongkan = auto-detect kompatibel)"
        required: false
        default: ""
      publish_release:
        description: "Publish ke GitHub Release?"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build YouTube (universal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download Morphe tools (CLI + Patches + Integrations)
        run: python scripts/download_tools.py

      - name: Download base YouTube APK dari APKMirror
        env:
          YT_VERSION: ${{ github.event.inputs.yt_version }}
        run: |
          python scripts/download_apk.py \
            --app youtube \
            --arch universal \
            ${YT_VERSION:+--version "$YT_VERSION"}

      - name: Patch YouTube
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          python scripts/patch.py \
            --app youtube \
            --arch universal \
            --patches-config patches/youtube-morphe.txt \
            --keystore keystore/morphe.keystore \
            --keystore-pass "$KEYSTORE_PASS" \
            --key-alias "$KEY_ALIAS"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-morphe-universal
          path: output/youtube-morphe-*.apk
          retention-days: 7

  release:
    name: 📦 Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.publish_release != 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: youtube-morphe-universal
          path: release-files

      - name: Baca versi dari metadata
        id: meta
        run: |
          VERSION=$(cat output/.version 2>/dev/null || echo "unknown")
          DATE=$(date +'%Y-%m-%d')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Publish ke GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Morphe YouTube — ${{ steps.meta.outputs.date }}"
          body: |
            ## 📦 Morphe YouTube (Universal) Build

            **Tanggal Build:** ${{ steps.meta.outputs.date }}
            **Versi YouTube:** ${{ steps.meta.outputs.version }}
            **Tools:** Morphe CLI + Patches (latest)
            **Arsitektur:** Universal (semua HP)

            ### ⚠️ Catatan
            - Butuh **MicroG-RE** dari Morphe agar bisa login Google
            - Install dengan mengizinkan sumber tidak dikenal
            - Uninstall YouTube original terlebih dahulu

            ---
            *Build otomatis via GitHub Actions — bukan build resmi Morphe Team*
          artifacts: "release-files/*.apk"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
